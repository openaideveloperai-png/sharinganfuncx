<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>Jumpscare Page</title>\n    <style>\n        body {\n            margin: 0;\n            padding: 0;\n            overflow: hidden;\n        }\n        .jumpscare-overlay {\n            position: fixed;\n            top: 0;\n            left: 0;\n            width: 100%;\n            height: 100%;\n            background: rgba(0, 0, 0, 0.8);\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            opacity: 0;\n            visibility: hidden;\n            transition: opacity 0.5s ease;\n        }\n        .jumpscare-overlay.visible {\n            opacity: 1;\n            visibility: visible;\n        }\n        .jumpscare-image {\n            width: 80%;\n            max-width: 600px;\n        }\n    </style>\n</head>\n<body>\n    <div class='jumpscare-overlay' id='jumpscareOverlay'>\n        <img src='your-jumpscare-image-url.png' alt='Jumpscare' class='jumpscare-image'>\n    </div>\n    <script>\n        window.onload = function() {\n            const overlay = document.getElementById('jumpscareOverlay');\n            setTimeout(() => {\n                overlay.classList.add('visible');\n            }, 1000);  // delay before jumpscare shows\n            setTimeout(() => {\n                overlay.classList.remove('visible');\n            }, 5000); // how long the jumpscare is visible\n        };\n    <\/script>\n</body>\n</html>
