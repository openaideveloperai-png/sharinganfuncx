<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Function Email</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', system-ui; }
    .email-row:hover { background-color: #1a1a1a; }
    .modal-content { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
  <div class="flex h-screen">

    <!-- Sidebar -->
    <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
      <div class="p-6">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-red-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">F</div>
          <h1 class="text-3xl font-semibold text-white">Function</h1>
        </div>
        <p class="text-xs text-zinc-500 mt-1">Abuse@sharinganfuncx.fun</p>
      </div>

      <div class="px-4 mt-4">
        <button onclick="showComposeModal()" 
                class="w-full bg-red-600 hover:bg-red-700 py-3.5 rounded-2xl font-medium flex items-center justify-center gap-2 shadow-lg">
          <i class="fas fa-pen-to-square"></i> Compose
        </button>
      </div>

      <div class="mt-8 px-4">
        <div onclick="loadInbox()" class="flex items-center gap-3 px-6 py-3 hover:bg-zinc-800 rounded-xl cursor-pointer bg-zinc-800">
          <i class="fas fa-inbox text-red-400"></i>
          <span class="font-medium">Inbox</span>
        </div>
      </div>

      <div class="mt-auto p-6 text-xs text-zinc-500">
        Powered by Cloudflare + Resend
      </div>
    </div>

    <!-- Main Area -->
    <div class="flex-1 flex flex-col">
      <!-- Header -->
      <div class="h-14 border-b border-zinc-800 bg-zinc-900 flex items-center px-8">
        <h2 class="text-lg font-semibold">Inbox</h2>
        <button onclick="loadInbox()" class="ml-auto text-zinc-400 hover:text-white flex items-center gap-2 text-sm">
          <i class="fas fa-sync-alt"></i> Refresh
        </button>
      </div>

      <!-- Email List -->
      <div id="email-list" class="flex-1 overflow-auto p-4 space-y-2">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- Email Viewer (Right Sidebar Style) -->
    <div id="viewer" class="w-0 lg:w-2/5 border-l border-zinc-800 bg-zinc-900 overflow-auto transition-all duration-300 hidden lg:block">
      <div class="p-6">
        <button onclick="closeViewer()" class="text-zinc-400 hover:text-white mb-6">
          ← Back to Inbox
        </button>
        
        <div id="viewer-subject" class="text-2xl font-semibold mb-6"></div>
        
        <div class="flex items-center gap-3 mb-8">
          <div id="viewer-from" class="font-medium"></div>
          <div id="viewer-time" class="text-xs text-zinc-500 ml-auto"></div>
        </div>

        <div id="viewer-body" class="prose prose-invert text-zinc-300 leading-relaxed text-[15px] mb-12"></div>

        <!-- Inline Reply -->
        <div class="border-t border-zinc-700 pt-6">
          <textarea id="reply-text" rows="4" 
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl p-4 text-sm focus:outline-none focus:border-red-600"
                    placeholder="Write your reply..."></textarea>
          <button onclick="sendReply()" 
                  class="mt-4 bg-red-600 hover:bg-red-700 px-8 py-3 rounded-2xl font-medium flex items-center gap-2">
            <i class="fas fa-paper-plane"></i> Send Reply
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Compose Modal -->
  <div id="compose-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-zinc-900 w-full max-w-lg mx-4 rounded-3xl p-8">
      <h2 class="text-xl font-semibold mb-6">New Message</h2>
      <input id="compose-to" placeholder="To" class="w-full bg-zinc-800 border border-zinc-700 p-4 rounded-2xl mb-4">
      <input id="compose-subject" placeholder="Subject" class="w-full bg-zinc-800 border border-zinc-700 p-4 rounded-2xl mb-4">
      <textarea id="compose-body" rows="10" placeholder="Message" class="w-full bg-zinc-800 border border-zinc-700 p-4 rounded-3xl"></textarea>
      
      <div class="flex gap-4 mt-8">
        <button onclick="closeComposeModal()" class="flex-1 py-4 border border-zinc-700 rounded-2xl">Cancel</button>
        <button onclick="sendCompose()" class="flex-1 bg-red-600 py-4 rounded-2xl font-medium">Send</button>
      </div>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://sharingan-mail-worker.openaideveloperai.workers.dev";
    let currentEmail = null;

    async function loadInbox() {
      const container = document.getElementById("email-list");
      container.innerHTML = `<div class="text-center py-20 text-zinc-500">Loading...</div>`;

      try {
        const res = await fetch(`${WORKER_URL}/inbox`);
        const emails = await res.json();

        let html = "";
        emails.forEach(email => {
          let cleanBody = (email.body || "").replace(/--[\w\d=]+/g, "").replace(/Content-Type:.*?\r\n/gi, "").trim();
          html += `
            <div onclick="openEmail(${email.id})" class="email-row bg-zinc-900 border border-zinc-800 p-5 rounded-2xl cursor-pointer hover:border-red-600 transition-colors">
              <div class="flex justify-between text-sm">
                <div class="font-medium text-red-400">${email.from_email}</div>
                <div class="text-zinc-500">${email.received_at}</div>
              </div>
              <div class="font-semibold mt-1 text-white">${email.subject || '(No Subject)'}</div>
              <div class="text-zinc-400 text-sm mt-2 line-clamp-2">${cleanBody.substring(0, 110)}...</div>
            </div>`;
        });

        container.innerHTML = html || `<div class="text-center py-20 text-zinc-500">No emails yet</div>`;
      } catch (e) {
        container.innerHTML = `<div class="text-red-400 text-center py-20">Failed to load inbox</div>`;
      }
    }

    async function openEmail(id) {
      try {
        const res = await fetch(`${WORKER_URL}/inbox`);
        const emails = await res.json();
        currentEmail = emails.find(e => e.id === id);
        if (!currentEmail) return;

        document.getElementById("viewer-subject").textContent = currentEmail.subject || "(No Subject)";
        document.getElementById("viewer-from").innerHTML = `<span class="text-red-400">${currentEmail.from_email}</span>`;
        document.getElementById("viewer-time").textContent = currentEmail.received_at;

        let cleanBody = (currentEmail.body || "")
          .replace(/--[\w\d=]+/g, "")
          .replace(/Content-Type:.*?\r\n/gi, "")
          .replace(/charset="UTF-8"/gi, "")
          .replace(/\r\n/g, "<br>");

        document.getElementById("viewer-body").innerHTML = cleanBody;

        document.getElementById("viewer").classList.remove("hidden");
        document.getElementById("reply-text").value = "";
      } catch (e) {
        alert("Could not open email");
      }
    }

    function closeViewer() {
      document.getElementById("viewer").classList.add("hidden");
    }

    async function sendReply() {
      if (!currentEmail) return;
      const replyText = document.getElementById("reply-text").value.trim();
      if (!replyText) return alert("Please write a reply");

      const subject = currentEmail.subject.startsWith("Re:") 
        ? currentEmail.subject 
        : `Re: ${currentEmail.subject || "No Subject"}`;

      try {
        const res = await fetch(`${WORKER_URL}/send`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            to: currentEmail.from_email,
            subject: subject,
            message: replyText
          })
        });

        if (res.ok) {
          alert("✅ Reply sent successfully!");
          document.getElementById("reply-text").value = "";
          loadInbox();
        } else {
          alert("Failed to send reply");
        }
      } catch (e) {
        alert("Error sending reply");
      }
    }

    function showComposeModal() {
      document.getElementById("compose-to").value = "";
      document.getElementById("compose-subject").value = "";
      document.getElementById("compose-body").value = "";
      document.getElementById("compose-modal").classList.remove("hidden");
      document.getElementById("compose-modal").classList.add("flex");
    }

    function closeComposeModal() {
      document.getElementById("compose-modal").classList.add("hidden");
      document.getElementById("compose-modal").classList.remove("flex");
    }

    async function sendCompose() {
      const to = document.getElementById("compose-to").value.trim();
      const subject = document.getElementById("compose-subject").value.trim();
      const body = document.getElementById("compose-body").value.trim();

      if (!to || !subject || !body) return alert("Please fill all fields");

      const res = await fetch(`${WORKER_URL}/send`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ to, subject, message: body })
      });

      if (res.ok) {
        alert("✅ Message sent!");
        closeComposeModal();
        loadInbox();
      } else {
        alert("Failed to send");
      }
    }

    // Auto refresh
    setInterval(loadInbox, 6000);
    window.onload = loadInbox;
  </script>
</body>
</html>
