<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Function Email</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', system-ui; }
    .email-row { transition: all 0.2s; }
    .email-row:hover { background-color: #1f1f1f; }
    .unread { border-left: 4px solid #ef4444; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
  <div class="flex h-screen">

    <!-- Sidebar -->
    <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
      <div class="p-6 flex items-center gap-3">
        <div class="w-9 h-9 bg-red-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">F</div>
        <div>
          <h1 class="text-3xl font-semibold">Function</h1>
          <p class="text-xs text-zinc-500">Abuse@sharinganfuncx.fun</p>
        </div>
      </div>

      <div class="px-6 mt-2">
        <button onclick="showComposeModal()" 
                class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-2xl font-medium flex items-center justify-center gap-2">
          <i class="fas fa-pen"></i> Compose
        </button>
      </div>

      <div class="mt-8 px-3">
        <div class="px-6 py-3 bg-zinc-800 rounded-2xl flex items-center gap-3 text-red-400 font-medium">
          <i class="fas fa-inbox"></i> Inbox
        </div>
      </div>

      <div class="mt-auto px-6 py-6 text-xs text-zinc-500 border-t border-zinc-800">
        Powered by Cloudflare + Resend
      </div>
    </div>

    <!-- Main Inbox -->
    <div class="flex-1 flex flex-col">
      <div class="h-14 border-b border-zinc-800 bg-zinc-900 px-8 flex items-center">
        <h2 class="font-semibold text-lg">Inbox</h2>
        
        <div class="ml-auto flex items-center gap-4">
          <div class="relative w-80">
            <input id="search-input" type="text" placeholder="Search emails..." 
                   onkeyup="filterEmails()" 
                   class="w-full bg-zinc-800 border border-zinc-700 pl-10 py-2.5 rounded-2xl text-sm focus:outline-none focus:border-red-600">
            <i class="fas fa-search absolute left-4 top-3 text-zinc-500"></i>
          </div>
          <button onclick="loadInbox()" class="flex items-center gap-2 text-zinc-400 hover:text-white">
            <i class="fas fa-sync"></i> Refresh
          </button>
        </div>
      </div>

      <div id="email-list" class="flex-1 overflow-auto p-4 space-y-2">
        <!-- Emails loaded here -->
      </div>
    </div>

    <!-- Email Viewer -->
    <div id="viewer" class="w-0 lg:w-2/5 border-l border-zinc-800 bg-zinc-900 overflow-auto hidden lg:flex flex-col">
      <div class="p-6 border-b border-zinc-800 flex items-center">
        <button onclick="closeViewer()" class="text-zinc-400 hover:text-white flex items-center gap-2">
          ← Back
        </button>
      </div>

      <div class="p-6 flex-1 overflow-auto">
        <div id="viewer-subject" class="text-2xl font-semibold mb-6"></div>
        
        <div class="flex items-center gap-3 mb-8">
          <div id="viewer-from" class="font-medium text-red-400"></div>
          <div id="viewer-time" class="text-xs text-zinc-500 ml-auto"></div>
        </div>

        <div id="viewer-body" class="text-zinc-300 leading-relaxed text-[15.2px] whitespace-pre-wrap"></div>
      </div>

      <!-- Inline Reply Section -->
      <div class="p-6 border-t border-zinc-800 bg-zinc-950">
        <textarea id="reply-text" rows="3" placeholder="Write your reply here..." 
                  class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-4 text-sm focus:outline-none focus:border-red-600"></textarea>
        <button onclick="sendReply()" 
                class="mt-4 w-full bg-red-600 hover:bg-red-700 py-3.5 rounded-2xl font-medium flex items-center justify-center gap-2">
          <i class="fas fa-paper-plane"></i> Send Reply
        </button>
      </div>
    </div>
  </div>

  <!-- Compose Modal -->
  <div id="compose-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 w-full max-w-lg mx-4 rounded-3xl p-8">
      <h2 class="text-xl font-semibold mb-6">New Message</h2>
      <input id="compose-to" placeholder="To" class="w-full bg-zinc-800 border border-zinc-700 p-4 rounded-2xl mb-4">
      <input id="compose-subject" placeholder="Subject" class="w-full bg-zinc-800 border border-zinc-700 p-4 rounded-2xl mb-4">
      <textarea id="compose-body" rows="10" placeholder="Write your message..." class="w-full bg-zinc-800 border border-zinc-700 p-4 rounded-3xl mb-6"></textarea>
      
      <div class="flex gap-4">
        <button onclick="closeComposeModal()" class="flex-1 py-4 border border-zinc-700 rounded-2xl">Cancel</button>
        <button onclick="sendCompose()" class="flex-1 bg-red-600 py-4 rounded-2xl font-medium">Send</button>
      </div>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://sharingan-mail-worker.openaideveloperai.workers.dev";
    let currentEmail = null;
    let allEmails = [];

    async function loadInbox() {
      const container = document.getElementById("email-list");
      container.innerHTML = `<div class="text-center py-20 text-zinc-500">Loading emails...</div>`;

      try {
        const res = await fetch(`${WORKER_URL}/inbox`);
        allEmails = await res.json();

        renderEmails(allEmails);
      } catch (e) {
        container.innerHTML = `<div class="text-red-400 text-center py-20">Failed to load inbox</div>`;
      }
    }

    function renderEmails(emails) {
      const container = document.getElementById("email-list");
      let html = "";

      emails.forEach(email => {
        const cleanBody = (email.body || "").replace(/--[\w=]+/g, "").replace(/Content-Type:.*?\r\n/gi, "").trim();
        html += `
          <div onclick="openEmail(${email.id})" class="email-row bg-zinc-900 border border-zinc-800 p-5 rounded-2xl cursor-pointer hover:border-red-600">
            <div class="flex justify-between">
              <div class="font-medium text-red-400">${email.from_email}</div>
              <div class="text-xs text-zinc-500">${email.received_at}</div>
            </div>
            <div class="font-semibold mt-1">${email.subject || '(No Subject)'}</div>
            <div class="text-sm text-zinc-400 mt-2 line-clamp-2">${cleanBody.substring(0, 130)}...</div>
          </div>`;
      });

      container.innerHTML = html || `<div class="text-center py-20 text-zinc-500">No emails yet</div>`;
    }

    function filterEmails() {
      const term = document.getElementById("search-input").value.toLowerCase();
      const filtered = allEmails.filter(email => 
        (email.subject || "").toLowerCase().includes(term) ||
        (email.from_email || "").toLowerCase().includes(term) ||
        (email.body || "").toLowerCase().includes(term)
      );
      renderEmails(filtered);
    }

    async function openEmail(id) {
      currentEmail = allEmails.find(e => e.id === id);
      if (!currentEmail) return;

      document.getElementById("viewer-subject").textContent = currentEmail.subject || "(No Subject)";
      document.getElementById("viewer-from").innerHTML = currentEmail.from_email;
      document.getElementById("viewer-time").textContent = currentEmail.received_at;

      let cleanBody = (currentEmail.body || "")
        .replace(/--[\w\d=]+/g, "")
        .replace(/Content-Type:.*?\r\n/gi, "")
        .replace(/\r\n/g, "<br>");

      document.getElementById("viewer-body").innerHTML = cleanBody;
      document.getElementById("reply-text").value = "";

      document.getElementById("viewer").classList.remove("hidden");
    }

    function closeViewer() {
      document.getElementById("viewer").classList.add("hidden");
    }

    async function sendReply() {
      if (!currentEmail) return;
      const replyText = document.getElementById("reply-text").value.trim();
      if (!replyText) return alert("Please write something");

      const subject = currentEmail.subject.startsWith("Re:") ? currentEmail.subject : `Re: ${currentEmail.subject || ""}`;

      try {
        const res = await fetch(`${WORKER_URL}/send`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            to: currentEmail.from_email,
            subject: subject,
            message: replyText
          })
        });

        if (res.ok) {
          alert("✅ Reply sent!");
          document.getElementById("reply-text").value = "";
          loadInbox();        // Refresh to show new reply at top
        } else {
          alert("Failed to send reply");
        }
      } catch (e) {
        alert("Error sending reply");
      }
    }

    function showComposeModal() {
      document.getElementById("compose-to").value = "";
      document.getElementById("compose-subject").value = "";
      document.getElementById("compose-body").value = "";
      document.getElementById("compose-modal").classList.remove("hidden");
      document.getElementById("compose-modal").classList.add("flex");
    }

    function closeComposeModal() {
      document.getElementById("compose-modal").classList.add("hidden");
      document.getElementById("compose-modal").classList.remove("flex");
    }

    async function sendCompose() {
      const to = document.getElementById("compose-to").value.trim();
      const subject = document.getElementById("compose-subject").value.trim();
      const body = document.getElementById("compose-body").value.trim();

      if (!to || !subject || !body) return alert("Please fill all fields");

      const res = await fetch(`${WORKER_URL}/send`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ to, subject, message: body })
      });

      if (res.ok) {
        alert("✅ Message sent!");
        closeComposeModal();
        loadInbox();
      } else {
        alert("Failed to send");
      }
    }

    // Auto refresh
    setInterval(loadInbox, 7000);
    window.onload = loadInbox;
  </script>
</body>
</html>
