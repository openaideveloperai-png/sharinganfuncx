<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Function Mail</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { background:#0f1115; color:#e4e4e7; font-family: Inter, system-ui; }
.email-row:hover { background:#1a1d23; }
</style>
</head>

<body>

<div class="flex h-screen">

<!-- SIDEBAR -->
<div class="w-72 bg-[#111318] border-r border-[#1f232b] flex flex-col">
  <div class="p-6 flex items-center gap-3">
    <div class="w-9 h-9 bg-red-500 rounded-xl flex items-center justify-center">F</div>
    <div>
      <h1 class="font-semibold">Function</h1>
    </div>
  </div>

  <div class="px-6">
    <button onclick="showComposeModal()" class="w-full bg-red-500 py-3 rounded-xl">
      Compose
    </button>
  </div>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col">

<div class="h-14 border-b border-[#1f232b] flex items-center px-6 gap-4">
  <input id="search-input" onkeyup="filterEmails()" placeholder="Search"
    class="bg-[#1a1d23] px-3 py-2 rounded w-80">

  <button onclick="loadInbox()">Refresh</button>
</div>

<div id="email-list" class="flex-1 overflow-auto"></div>

</div>

<!-- VIEWER -->
<div id="viewer" class="hidden w-2/5 bg-[#111318] border-l border-[#1f232b] flex-col">

<div class="p-4 border-b border-[#1f232b]">
  <button onclick="closeViewer()">Back</button>
</div>

<div class="p-6 flex-1 overflow-auto">
  <div id="viewer-subject"></div>
  <div id="viewer-from"></div>
  <div id="viewer-time"></div>
  <div id="viewer-body"></div>
</div>

<div class="p-4">
  <textarea id="reply-text"></textarea>
  <button onclick="sendReply()">Send</button>
</div>

</div>

</div>

<!-- COMPOSE -->
<div id="compose-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
  <div class="bg-[#111318] p-6">
    <input id="compose-to" placeholder="To"><br>
    <input id="compose-subject" placeholder="Subject"><br>
    <textarea id="compose-body"></textarea><br>

    <button onclick="sendCompose()">Send</button>
    <button onclick="closeComposeModal()">Cancel</button>
  </div>
</div>

<!-- TOS -->
<div id="tos-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
  <div class="bg-[#111318] p-6 max-w-md">
    <h2>Terms</h2>
    <p>Do not abuse this system or you will be banned.</p>
    <button onclick="acceptTOS()">I Agree</button>
  </div>
</div>

<script>
const WORKER_URL = "https://sharingan-mail-worker.openaideveloperai.workers.dev";

let currentEmail=null;
let allEmails=[];

/* TOS */
function checkTOS(){
  if(!localStorage.getItem("tosAccepted")){
    document.getElementById("tos-modal").classList.remove("hidden");
  }
}
function acceptTOS(){
  localStorage.setItem("tosAccepted","yes");
  document.getElementById("tos-modal").classList.add("hidden");
}

/* utils */
function sanitizeHTML(str){
  return (str||"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

function cleanEmailBody(body){
  if(!body) return '';
  return body.replace(/On .* wrote:[\s\S]*/i,'').trim();
}

/* inbox */
async function loadInbox(){
  const el=document.getElementById("email-list");
  el.innerHTML="Loading...";
  try{
    const res=await fetch(`${WORKER_URL}/inbox`);
    allEmails=await res.json();
    renderEmails(allEmails);
  }catch{
    el.innerHTML="Error";
  }
}

function renderEmails(emails){
  const el=document.getElementById("email-list");
  let html="";
  emails.forEach(e=>{
    html+=`
<div onclick="openEmail(${e.id})" class="email-row p-3 border-b border-[#1f232b] cursor-pointer">
${sanitizeHTML(e.from_email)} - ${sanitizeHTML(e.subject||'No subject')}
</div>`;
  });
  el.innerHTML=html;
}

function filterEmails(){
  const t=document.getElementById("search-input").value.toLowerCase();
  renderEmails(allEmails.filter(e=>
    (e.subject||'').toLowerCase().includes(t)||
    (e.from_email||'').toLowerCase().includes(t)||
    (e.body||'').toLowerCase().includes(t)
  ));
}

/* viewer */
function openEmail(id){
  currentEmail=allEmails.find(e=>e.id===id);
  if(!currentEmail) return;

  document.getElementById("viewer").classList.remove("hidden");

  document.getElementById("viewer-subject").textContent=currentEmail.subject;
  document.getElementById("viewer-from").textContent=currentEmail.from_email;
  document.getElementById("viewer-time").textContent=currentEmail.received_at;
  document.getElementById("viewer-body").innerHTML=sanitizeHTML(cleanEmailBody(currentEmail.body));
}

function closeViewer(){
  document.getElementById("viewer").classList.add("hidden");
}

/* send */
async function sendReply(){
  if(!currentEmail) return;
  const msg=document.getElementById("reply-text").value.trim();
  if(!msg) return;

  await fetch(`${WORKER_URL}/send`,{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      to:currentEmail.from_email,
      subject:"Re: "+(currentEmail.subject||""),
      message:msg
    })
  });

  alert("Sent");
}

function showComposeModal(){
  document.getElementById("compose-modal").classList.remove("hidden");
}
function closeComposeModal(){
  document.getElementById("compose-modal").classList.add("hidden");
}

async function sendCompose(){
  const to=document.getElementById("compose-to").value.trim();
  const subject=document.getElementById("compose-subject").value.trim();
  const body=document.getElementById("compose-body").value.trim();

  if(!to||!subject||!body) return alert("Fill all");

  await fetch(`${WORKER_URL}/send`,{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({to,subject,message:body})
  });

  alert("Sent");
  closeComposeModal();
  loadInbox();
}

window.onload=()=>{
  checkTOS();
  loadInbox();
};
</script>

</body>
</html>
