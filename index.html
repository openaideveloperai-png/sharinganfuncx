<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Function Mail</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { background:#0f1115; color:#e4e4e7; font-family: Inter, system-ui; }
.email-row { transition:0.15s; }
.email-row:hover { background:#1a1d23; border-color:#ef4444; }
</style>
</head>

<body class="min-h-screen">

<div class="flex h-screen">

<!-- SIDEBAR -->
<div class="w-72 bg-[#111318] border-r border-[#1f232b] flex flex-col">
  <div class="p-6 flex items-center gap-3">
    <div class="w-10 h-10 bg-red-500 rounded-xl flex items-center justify-center">F</div>
    <h1 class="text-lg font-semibold">Function</h1>
  </div>

  <div class="px-6">
    <button onclick="showComposeModal()" class="w-full bg-red-500 py-3 rounded-xl">Compose</button>
  </div>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col">

<div class="h-14 flex items-center px-6 gap-4 border-b border-[#1f232b]">
  <input id="search-input" onkeyup="filterEmails()" placeholder="Search"
    class="bg-[#1a1d23] px-3 py-2 rounded w-80">
  <button onclick="manualRefresh()">Refresh</button>
</div>

<div id="email-list" class="flex-1 overflow-auto p-4 space-y-2"></div>

</div>

<!-- VIEWER -->
<div id="viewer" class="hidden w-2/5 bg-[#111318] border-l border-[#1f232b] flex-col">

<div class="p-4 border-b border-[#1f232b]">
  <button onclick="closeViewer()">Back</button>
</div>

<div class="p-6 flex-1 overflow-auto">
  <div id="viewer-subject"></div>
  <div id="viewer-from"></div>
  <div id="viewer-time"></div>
  <div id="viewer-body"></div>
</div>

<div class="p-4">
  <textarea id="reply-text" class="w-full bg-[#1a1d23] p-2 rounded"></textarea>
  <button onclick="sendReply()" class="mt-2 bg-red-500 w-full py-2 rounded">Send</button>
</div>

</div>

</div>

<!-- COMPOSE -->
<div id="compose-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
  <div class="bg-[#111318] p-6 rounded-xl">
    <input id="compose-to" placeholder="To"><br>
    <input id="compose-subject" placeholder="Subject"><br>
    <textarea id="compose-body"></textarea><br>
    <button onclick="sendCompose()">Send</button>
    <button onclick="closeComposeModal()">Cancel</button>
  </div>
</div>

<!-- TOS -->
<div id="tos-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
  <div class="bg-[#111318] p-6 max-w-md rounded-xl">
    <h2 class="text-lg mb-3">Terms</h2>
    <p class="text-sm mb-4">Do not abuse this system or you will be banned.</p>
    <button onclick="acceptTOS()" class="bg-red-500 px-4 py-2 rounded w-full">
      I Agree
    </button>
  </div>
</div>

<script>
const WORKER_URL = "https://sharingan-mail-worker.openaideveloperai.workers.dev";

let currentEmail=null;
let allEmails=[];
let knownIds=new Set();

/* TOS */
function checkTOS(){
  if(!localStorage.getItem("tosAccepted")){
    document.getElementById("tos-modal").classList.remove("hidden");
  }
}
function acceptTOS(){
  localStorage.setItem("tosAccepted","yes");
  document.getElementById("tos-modal").classList.add("hidden");
}

/* utils */
function sanitizeHTML(str){
  return (str||"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}
function cleanEmailBody(body){
  return (body||"").replace(/On .* wrote:[\s\S]*/i,'').trim();
}

/* FULL render (first load) */
function renderEmails(emails){
  const el=document.getElementById("email-list");
  el.innerHTML="";
  emails.forEach(e=>{
    knownIds.add(e.id);
    el.appendChild(createEmailElement(e,true));
  });
}

/* CREATE single row */
function createEmailElement(e,appendBottom=false){
  const div=document.createElement("div");
  div.className="email-row bg-[#111318] border border-[#1f232b] p-4 rounded-lg cursor-pointer";
  div.onclick=()=>openEmail(e.id);

  div.innerHTML=`
    <div class="flex justify-between">
      <div class="text-red-400">${sanitizeHTML(e.from_email)}</div>
      <div class="text-xs text-zinc-500">${e.received_at}</div>
    </div>
    <div class="font-medium mt-1">${sanitizeHTML(e.subject||'(No Subject)')}</div>
    <div class="text-sm text-zinc-500 mt-2">
      ${sanitizeHTML(cleanEmailBody(e.body).slice(0,120))}
    </div>
  `;

  return div;
}

/* SMART UPDATE */
async function checkNewEmails(){
  try{
    const res=await fetch(`${WORKER_URL}/inbox`);
    const data=await res.json();

    const container=document.getElementById("email-list");

    data.forEach(e=>{
      if(!knownIds.has(e.id)){
        knownIds.add(e.id);
        allEmails.unshift(e);

        const el=createEmailElement(e);
        container.prepend(el);
      }
    });

  }catch{}
}

/* manual refresh */
async function manualRefresh(){
  knownIds.clear();
  loadInbox();
}

/* initial load */
async function loadInbox(){
  const el=document.getElementById("email-list");
  el.innerHTML="Loading...";
  try{
    const res=await fetch(`${WORKER_URL}/inbox`);
    allEmails=await res.json();
    renderEmails(allEmails);
  }catch{
    el.innerHTML="Error";
  }
}

/* search */
function filterEmails(){
  const t=document.getElementById("search-input").value.toLowerCase();
  const filtered=allEmails.filter(e=>
    (e.subject||'').toLowerCase().includes(t)||
    (e.from_email||'').toLowerCase().includes(t)||
    (e.body||'').toLowerCase().includes(t)
  );
  renderEmails(filtered);
}

/* viewer */
function openEmail(id){
  currentEmail=allEmails.find(e=>e.id===id);
  if(!currentEmail) return;

  document.getElementById("viewer").classList.remove("hidden");

  document.getElementById("viewer-subject").textContent=currentEmail.subject;
  document.getElementById("viewer-from").textContent=currentEmail.from_email;
  document.getElementById("viewer-time").textContent=currentEmail.received_at;
  document.getElementById("viewer-body").innerHTML=
    sanitizeHTML(cleanEmailBody(currentEmail.body)).replace(/\n/g,'<br>');
}

function closeViewer(){
  document.getElementById("viewer").classList.add("hidden");
}

/* send */
async function sendReply(){
  if(!currentEmail) return;
  const msg=document.getElementById("reply-text").value.trim();
  if(!msg) return;

  await fetch(`${WORKER_URL}/send`,{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      to:currentEmail.from_email,
      subject:"Re: "+(currentEmail.subject||""),
      message:msg
    })
  });

  alert("Sent");
}

function showComposeModal(){
  document.getElementById("compose-modal").classList.remove("hidden");
}
function closeComposeModal(){
  document.getElementById("compose-modal").classList.add("hidden");
}

async function sendCompose(){
  const to=document.getElementById("compose-to").value.trim();
  const subject=document.getElementById("compose-subject").value.trim();
  const body=document.getElementById("compose-body").value.trim();

  if(!to||!subject||!body) return alert("Fill all");

  await fetch(`${WORKER_URL}/send`,{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({to,subject,message:body})
  });

  alert("Sent");
  closeComposeModal();
}

/* start */
window.onload=()=>{
  checkTOS();
  loadInbox();
  setInterval(checkNewEmails,5000);
};
</script>

</body>
</html>
