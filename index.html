<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jump Scare Effect</title>
</head>
<body>
    <h1>Welcome to the Jumpscare Page</h1>
    <img src="image.png" alt="Jump scare image" id="jumpscareImage" style="display:none;">
    <audio id="jumpscareAudio">
        <source src="freesound_community-jumpscare-94984.mp3" type="audio/mpeg">
    </audio>

    <script>
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('jumpscareImage').style.display = 'block';
                document.getElementById('jumpscareAudio').play();
            }, 3000); // 3 seconds delay before jumpscare
        };
    </script>
</body>
</html>
