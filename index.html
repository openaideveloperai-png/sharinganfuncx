<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHARINGAN MAIL • Abuse@sharinganfuncx.fun</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    body { font-family: 'Press Start 2P', system-ui; }
  </style>
</head>
<body class="bg-black text-white min-h-screen p-8">
  <div class="max-w-6xl mx-auto">
    <h1 class="text-5xl text-red-500 mb-2 flex items-center gap-4">
      🔴 SHARINGAN FUNCX MAIL
    </h1>
    <p class="text-red-400 mb-8">Abuse@sharinganfuncx.fun — Real-time Inbox</p>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <!-- Inbox -->
      <div>
        <div class="flex justify-between mb-4">
          <h2 class="text-red-400 text-2xl">📥 INBOX</h2>
          <button onclick="loadInbox()" 
                  class="bg-zinc-800 hover:bg-red-600 px-6 py-2 text-sm rounded">REFRESH</button>
        </div>
        <div id="inbox" class="space-y-4"></div>
      </div>

      <!-- Compose -->
      <div class="bg-zinc-900 p-8 rounded-3xl">
        <h2 class="text-red-400 text-2xl mb-6">✉️ COMPOSE</h2>
        <input id="to" placeholder="recipient@gmail.com" class="w-full p-4 bg-black border border-red-600 rounded-2xl mb-4">
        <input id="subject" placeholder="Subject" class="w-full p-4 bg-black border border-red-600 rounded-2xl mb-4">
        <textarea id="body" rows="8" placeholder="Write your message here..." class="w-full p-4 bg-black border border-red-600 rounded-3xl mb-6"></textarea>
        <button onclick="sendEmail()" 
                class="w-full bg-red-600 hover:bg-red-700 py-5 rounded-2xl font-bold text-lg">SEND FROM ABUSE@SHARINGANFUNCX.FUN</button>
      </div>
    </div>
  </div>

  <script>
    // CHANGE THIS LINE ↓↓↓
    const WORKER_URL = "https://sharingan-mail-worker.openaideveloperai.workers.dev";

    async function loadInbox() {
      try {
        const res = await fetch(`${WORKER_URL}/inbox`);
        const emails = await res.json();
        
        let html = emails.map(e => `
          <div class="bg-zinc-900 border border-red-600 p-6 rounded-3xl">
            <div class="text-red-400 text-sm">${e.from_email}</div>
            <div class="font-bold text-lg mt-1">${e.subject || '(no subject)'}</div>
            <div class="text-sm text-zinc-300 mt-3 line-clamp-3">${(e.body || '').substring(0, 180)}...</div>
            <div class="text-xs text-zinc-500 mt-4">${e.received_at}</div>
          </div>
        `).join('');

        document.getElementById("inbox").innerHTML = html || 
          `<p class='text-zinc-400 p-12 text-center'>No emails yet.<br>Send one to Abuse@sharinganfuncx.fun</p>`;
      } catch(e) {
        document.getElementById("inbox").innerHTML = "<p class='text-red-400 p-8'>Error loading inbox</p>";
      }
    }

    async function sendEmail() {
      const to = document.getElementById("to").value.trim();
      const subject = document.getElementById("subject").value.trim();
      const body = document.getElementById("body").value.trim();

      if (!to || !subject || !body) {
        alert("Please fill all fields");
        return;
      }

      await fetch(`${WORKER_URL}/send`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ to, subject, message: body })
      });

      alert("✅ Email sent successfully from Abuse@sharinganfuncx.fun");
      document.getElementById("body").value = "";
    }

    // Auto refresh every 4 seconds
    setInterval(loadInbox, 4000);
    window.onload = loadInbox;
  </script>
</body>
</html>
