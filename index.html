<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMAIL - Sharingan Mail</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    body { font-family: 'Press Start 2P', system-ui; }
    .email-row:hover { background-color: #1f1f1f; }
    .modal { animation: modalPop 0.3s ease-out; }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="flex h-screen">

    <!-- Sidebar -->
    <div class="w-72 bg-black border-r border-red-900 flex flex-col">
      <div class="p-6 border-b border-red-900">
        <div class="flex items-center gap-3">
          <div class="text-4xl">🔴</div>
          <div>
            <h1 class="text-3xl font-bold text-red-500 tracking-widest">SMAIL</h1>
            <p class="text-xs text-red-400">Sharingan Mail</p>
          </div>
        </div>
      </div>

      <div class="p-4">
        <button onclick="showComposeModal()" 
                class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-2">
          <i class="fas fa-pen"></i> COMPOSE
        </button>
      </div>

      <div class="px-4">
        <div onclick="loadInbox()" class="flex items-center gap-3 px-6 py-4 hover:bg-zinc-900 rounded-2xl cursor-pointer text-red-400">
          <i class="fas fa-inbox"></i>
          <span class="font-bold">Inbox</span>
        </div>
      </div>

      <div class="mt-auto p-6 text-xs text-zinc-500 border-t border-red-900">
        Abuse@sharinganfuncx.fun<br>
        Powered by Cloudflare + Resend
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col">
      <!-- Top Bar -->
      <div class="h-14 border-b border-red-900 flex items-center px-8 justify-between bg-zinc-950">
        <h2 class="text-xl font-bold text-red-400">INBOX</h2>
        <button onclick="loadInbox()" class="text-red-400 hover:text-white flex items-center gap-2">
          <i class="fas fa-sync"></i> Refresh
        </button>
      </div>

      <!-- Email List -->
      <div id="email-list" class="flex-1 overflow-auto p-4 space-y-1">
        <!-- Emails populated by JS -->
      </div>
    </div>
  </div>

  <!-- Email View Modal -->
  <div id="email-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="modal bg-zinc-900 w-full max-w-3xl mx-4 rounded-3xl overflow-hidden border border-red-600">
      <div class="p-6 border-b border-red-900 flex justify-between items-center">
        <h3 id="modal-subject" class="text-xl font-bold"></h3>
        <button onclick="closeModal()" class="text-3xl text-red-400 hover:text-white">×</button>
      </div>
      
      <div class="p-6">
        <div class="flex justify-between text-sm text-zinc-400 mb-6">
          <div>
            From: <span id="modal-from" class="text-red-400"></span>
          </div>
          <div id="modal-time" class="text-zinc-500"></div>
        </div>
        
        <div id="modal-body" class="prose prose-invert max-w-none text-zinc-200 leading-relaxed text-base"></div>
      </div>

      <div class="p-6 border-t border-red-900 flex gap-4">
        <button onclick="replyToEmail()" 
                class="flex-1 bg-red-600 hover:bg-red-700 py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
          <i class="fas fa-reply"></i> REPLY
        </button>
        <button onclick="closeModal()" 
                class="flex-1 border border-red-600 hover:bg-zinc-800 py-4 rounded-2xl font-bold">
          CLOSE
        </button>
      </div>
    </div>
  </div>

  <!-- Compose Modal -->
  <div id="compose-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="modal bg-zinc-900 w-full max-w-2xl mx-4 rounded-3xl p-8">
      <h2 class="text-2xl text-red-400 mb-6">New Message</h2>
      
      <input id="compose-to" placeholder="To: email@gmail.com" 
             class="w-full bg-zinc-950 border border-red-600 p-4 rounded-2xl mb-4">
      
      <input id="compose-subject" placeholder="Subject" 
             class="w-full bg-zinc-950 border border-red-600 p-4 rounded-2xl mb-4">
      
      <textarea id="compose-body" rows="10" placeholder="Write your message..." 
                class="w-full bg-zinc-950 border border-red-600 p-4 rounded-3xl mb-6"></textarea>
      
      <div class="flex gap-4">
        <button onclick="closeComposeModal()" 
                class="flex-1 py-4 border border-red-600 hover:bg-zinc-800 rounded-2xl">Cancel</button>
        <button onclick="sendComposeEmail()" 
                class="flex-1 bg-red-600 hover:bg-red-700 py-4 rounded-2xl font-bold">Send</button>
      </div>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://sharingan-mail-worker.openaideveloperai.workers.dev";
    let currentReplyTo = "";

    async function loadInbox() {
      const container = document.getElementById("email-list");
      container.innerHTML = `<div class="text-center text-zinc-400 py-12">Loading emails...</div>`;

      try {
        const res = await fetch(`${WORKER_URL}/inbox`);
        const emails = await res.json();

        let html = "";
        emails.forEach(email => {
          html += `
            <div onclick="openEmail(${email.id})" class="email-row bg-zinc-900 border border-zinc-800 p-5 rounded-2xl cursor-pointer hover:border-red-600 transition-all">
              <div class="flex justify-between">
                <div class="font-bold text-red-400">${email.from_email}</div>
                <div class="text-xs text-zinc-500">${email.received_at}</div>
              </div>
              <div class="font-bold mt-1">${email.subject || '(no subject)'}</div>
              <div class="text-sm text-zinc-400 mt-2 line-clamp-2">${(email.body || '').substring(0, 120)}...</div>
            </div>`;
        });

        container.innerHTML = html || `<div class="text-center text-zinc-400 py-20">Your inbox is empty.<br>Send something to Abuse@sharinganfuncx.fun</div>`;
      } catch (e) {
        container.innerHTML = `<div class="text-red-400 text-center py-20">Failed to load inbox</div>`;
      }
    }

    async function openEmail(id) {
      try {
        const res = await fetch(`${WORKER_URL}/inbox`);
        const emails = await res.json();
        const email = emails.find(e => e.id === id);
        if (!email) return;

        currentReplyTo = email.from_email;

        document.getElementById("modal-subject").textContent = email.subject || "(no subject)";
        document.getElementById("modal-from").textContent = email.from_email;
        document.getElementById("modal-time").textContent = email.received_at;
        document.getElementById("modal-body").innerHTML = `<p>${(email.body || '').replace(/\n/g, '<br>')}</p>`;

        document.getElementById("email-modal").classList.remove("hidden");
        document.getElementById("email-modal").classList.add("flex");
      } catch (e) {
        alert("Could not open email");
      }
    }

    function closeModal() {
      document.getElementById("email-modal").classList.add("hidden");
      document.getElementById("email-modal").classList.remove("flex");
    }

    function replyToEmail() {
      closeModal();
      showComposeModal(currentReplyTo);
    }

    function showComposeModal(to = "") {
      document.getElementById("compose-to").value = to;
      document.getElementById("compose-subject").value = "";
      document.getElementById("compose-body").value = "";
      document.getElementById("compose-modal").classList.remove("hidden");
      document.getElementById("compose-modal").classList.add("flex");
    }

    function closeComposeModal() {
      document.getElementById("compose-modal").classList.add("hidden");
      document.getElementById("compose-modal").classList.remove("flex");
    }

    async function sendComposeEmail() {
      const to = document.getElementById("compose-to").value.trim();
      const subject = document.getElementById("compose-subject").value.trim();
      const body = document.getElementById("compose-body").value.trim();

      if (!to || !subject || !body) {
        alert("Please fill all fields");
        return;
      }

      try {
        const res = await fetch(`${WORKER_URL}/send`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ to, subject, message: body })
        });

        if (res.ok) {
          alert("✅ Email sent successfully!");
          closeComposeModal();
          loadInbox();
        } else {
          alert("Failed to send email");
        }
      } catch (e) {
        alert("Error sending email");
      }
    }

    // Auto refresh every 5 seconds
    setInterval(loadInbox, 5000);
    window.onload = loadInbox;
  </script>
</body>
</html>
