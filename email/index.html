<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Function Email</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  body { font-family: 'Inter', system-ui, sans-serif; }
  
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #52525b; }

  textarea { resize: none; overflow: hidden; min-height: 2.5rem; }
  
  #viewer-body a { color: #f87171; text-decoration: underline; }
  #viewer-body ul, #viewer-body ol { margin-left: 1.5rem; padding-bottom: 1rem; }
  #viewer-body p { margin-bottom: 0.75rem; }
</style>
</head>

<body class="bg-black text-zinc-300 h-screen w-screen overflow-hidden flex">

<nav class="hidden md:flex w-64 bg-zinc-950 border-r border-zinc-800 flex-col flex-shrink-0 z-20">
  <div class="h-20 flex items-center px-6 gap-3 border-b border-zinc-800/50">
    <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center text-white font-bold text-xl shadow-md">F</div>
    <div class="truncate">
      <h1 class="text-lg font-semibold text-zinc-100">Function</h1>
      <p class="text-[10px] text-zinc-500 uppercase tracking-wider truncate">Abuse@sharinganfuncx.fun</p>
    </div>
  </div>

  <div class="p-4">
    <button onclick="showComposeModal()" class="w-full bg-red-600 hover:bg-red-500 text-white transition-colors py-2.5 rounded-lg font-medium text-sm flex items-center justify-center gap-2 shadow-sm">
      <i class="fas fa-pen text-xs"></i> Compose
    </button>
  </div>

  <div class="mt-auto p-4 text-[11px] text-zinc-600 text-center">
    Powered by Cloudflare + Resend
  </div>
</nav>

<main id="inbox-pane" class="flex-1 flex flex-col min-w-0 bg-black z-10">
  <header class="h-16 border-b border-zinc-800 flex items-center justify-between px-4 md:px-6 shrink-0 bg-black/90 backdrop-blur-md">
    <div class="flex items-center gap-3">
      <h2 class="font-semibold text-lg text-zinc-100">Inbox</h2>
    </div>
    
    <button id="refresh-btn" onclick="loadInbox()" class="text-sm text-zinc-400 hover:text-zinc-100 transition-colors flex items-center gap-2 px-3 py-1.5 rounded-md hover:bg-zinc-900" aria-label="Refresh Inbox">
      <i id="refresh-icon" class="fas fa-sync"></i> <span class="hidden sm:inline">Refresh</span>
    </button>
  </header>

  <div id="email-list" class="flex-1 overflow-y-auto p-3 space-y-1.5"></div>
</main>

<div id="resizer" class="hidden lg:block w-1.5 bg-zinc-900 hover:bg-zinc-600 active:bg-zinc-500 cursor-col-resize transition-colors z-40 shrink-0 border-l border-zinc-800"></div>

<section id="viewer-pane" class="hidden lg:flex w-full lg:w-[55%] xl:w-[60%] flex-col border-l border-zinc-800 bg-zinc-950 absolute lg:static inset-0 z-30 flex-shrink-0">
  
  <div class="h-16 px-4 border-b border-zinc-800 flex items-center shrink-0 bg-zinc-950/90 backdrop-blur-md">
    <button onclick="closeViewer()" class="text-zinc-400 hover:text-zinc-100 transition-colors flex items-center text-sm px-2 py-1 -ml-2 rounded hover:bg-zinc-900" aria-label="Close Viewer">
      <i class="fas fa-chevron-left mr-2 text-xs"></i> Back
    </button>
  </div>

  <div class="flex-1 overflow-y-auto p-6 lg:p-8">
    <h2 id="viewer-subject" class="text-2xl font-semibold text-zinc-100 mb-2 leading-tight"></h2>
    <div class="flex items-center gap-3 mb-8 pb-6 border-b border-zinc-800/50">
      <div class="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center text-zinc-400">
        <i class="fas fa-user"></i>
      </div>
      <div>
        <div id="viewer-from" class="text-sm font-medium text-zinc-200"></div>
        <div class="text-xs text-zinc-500">to me</div>
      </div>
    </div>
    <div id="viewer-body" class="text-zinc-300 text-sm leading-relaxed max-w-none"></div>
  </div>

  <div class="p-4 border-t border-zinc-800 bg-zinc-900/50 shrink-0">
    <div class="bg-black border border-zinc-800 rounded-lg focus-within:border-zinc-600 focus-within:ring-1 focus-within:ring-zinc-600 transition-all">
      <label for="reply-text" class="sr-only">Reply Message</label>
      <textarea id="reply-text" rows="1" placeholder="Reply to this email..." class="w-full bg-transparent p-3 outline-none text-sm text-zinc-200 placeholder-zinc-600" oninput="autoExpand(this)"></textarea>
      
      <div class="flex items-center justify-between p-2 border-t border-zinc-800/50">
        <label for="reply-files" class="sr-only">Attach Files</label>
        <input id="reply-files" type="file" multiple class="text-xs text-zinc-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-medium file:bg-zinc-800 file:text-zinc-300 hover:file:bg-zinc-700 file:cursor-pointer transition-colors cursor-pointer">
        
        <button id="reply-btn" onclick="sendReply()" class="bg-red-600 hover:bg-red-500 text-white text-sm font-medium px-4 py-1.5 rounded-md transition-colors">
          Send
        </button>
      </div>
    </div>
  </div>
</section>

<div id="compose-modal" class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
  <div class="bg-zinc-950 border border-zinc-800 rounded-xl w-full max-w-lg shadow-2xl overflow-hidden flex flex-col max-h-full">
    
    <div class="px-5 py-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/50">
      <h3 class="text-sm font-medium text-zinc-100">New Message</h3>
      <button onclick="closeComposeModal()" class="text-zinc-500 hover:text-zinc-200 transition-colors p-1" aria-label="Close Compose Modal">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="p-5 flex-1 overflow-y-auto space-y-4">
      <div>
        <label for="compose-to" class="sr-only">To</label>
        <input id="compose-to" placeholder="To" class="w-full bg-black border border-zinc-800 focus:border-zinc-600 p-2.5 rounded-md outline-none text-sm text-zinc-200 placeholder-zinc-600 transition-colors">
      </div>
      <div>
        <label for="compose-subject" class="sr-only">Subject</label>
        <input id="compose-subject" placeholder="Subject" class="w-full bg-black border border-zinc-800 focus:border-zinc-600 p-2.5 rounded-md outline-none text-sm text-zinc-200 placeholder-zinc-600 transition-colors">
      </div>
      <div>
        <label for="compose-body" class="sr-only">Message Body</label>
        <textarea id="compose-body" rows="6" placeholder="Write your message..." class="w-full bg-black border border-zinc-800 focus:border-zinc-600 p-2.5 rounded-md outline-none text-sm text-zinc-200 placeholder-zinc-600 transition-colors" oninput="autoExpand(this)"></textarea>
      </div>
    </div>

    <div class="px-5 py-4 border-t border-zinc-800 bg-zinc-900/50 flex items-center justify-between">
      <label for="compose-files" class="sr-only">Attach Files</label>
      <input id="compose-files" type="file" multiple class="text-xs text-zinc-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-medium file:bg-zinc-800 file:text-zinc-300 hover:file:bg-zinc-700 file:cursor-pointer transition-colors cursor-pointer max-w-[60%]">

      <button id="compose-btn" onclick="sendCompose()" class="bg-red-600 hover:bg-red-500 text-white text-sm font-medium px-5 py-2 rounded-md transition-colors min-w-[80px]">
        Send
      </button>
    </div>

  </div>
</div>

<script>
const WORKER_URL = "https://sharingan-mail-worker.openaideveloperai.workers.dev";

let allEmails = [];
let currentEmail = null;

function autoExpand(field) {
  field.style.height = 'inherit';
  field.style.height = (field.scrollHeight) + 'px';
}

function sanitizeHTML(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const badTags = doc.querySelectorAll('script, iframe, object, embed, form');
  badTags.forEach(el => el.remove());
  return doc.body.innerHTML;
}

function fileToBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve({ filename: file.name, content: reader.result.split(",")[1] });
    reader.readAsDataURL(file);
  });
}

function formatShortDate(dateStr) {
  const date = new Date(dateStr);
  const now = new Date();
  if (date.toDateString() === now.toDateString()) return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function renderEmails(emails) {
  const container = document.getElementById("email-list");
  container.innerHTML = "";

  if (emails.length === 0) {
    container.innerHTML = `<div class="text-center text-zinc-600 p-8 text-sm">No emails found.</div>`;
    return;
  }

  emails.forEach(e => {
    const tmp = document.createElement("DIV");
    tmp.innerHTML = sanitizeHTML(e.body);
    const preview = (tmp.textContent || tmp.innerText || "").substring(0, 90).replace(/\n/g, " ");

    const div = document.createElement("div");
    div.className = "group flex flex-col p-3 rounded-lg cursor-pointer hover:bg-zinc-900 border border-transparent hover:border-zinc-800 transition-all";
    
    div.innerHTML = `
      <div class="flex justify-between items-baseline mb-1 gap-2">
        <div class="text-sm font-medium text-zinc-200 truncate">${e.from_email}</div>
        <div class="text-xs text-zinc-500 whitespace-nowrap">${formatShortDate(e.received_at)}</div>
      </div>
      <div class="text-sm font-medium text-zinc-300 truncate mb-0.5">${e.subject || "(no subject)"}</div>
      <div class="text-xs text-zinc-500 truncate group-hover:text-zinc-400 transition-colors">${preview || "..."}</div>
    `;

    div.onclick = () => openEmail(e.id);
    container.appendChild(div);
  });
}

async function loadInbox() {
  const icon = document.getElementById("refresh-icon");
  icon.classList.add("animate-spin");
  try {
    const res = await fetch(`${WORKER_URL}/inbox`);
    allEmails = await res.json();
    renderEmails(allEmails);
  } catch (err) {
    document.getElementById("email-list").innerHTML = `<div class="text-center text-red-500 p-8 text-sm">Failed to connect to server.</div>`;
  } finally {
    icon.classList.remove("animate-spin");
  }
}

function openEmail(id) {
  currentEmail = allEmails.find(e => e.id === id);
  const viewer = document.getElementById("viewer-pane");
  const inbox = document.getElementById("inbox-pane");
  
  viewer.classList.remove("hidden");
  if (window.innerWidth < 1024) inbox.classList.add("hidden");

  document.getElementById("viewer-subject").textContent = currentEmail.subject || "(no subject)";
  document.getElementById("viewer-from").textContent = currentEmail.from_email;
  document.getElementById("viewer-body").innerHTML = sanitizeHTML(currentEmail.body);

  const replyBox = document.getElementById("reply-text");
  replyBox.value = "";
  replyBox.style.height = "inherit";
}

function closeViewer() {
  document.getElementById("viewer-pane").classList.add("hidden");
  document.getElementById("inbox-pane").classList.remove("hidden");
  currentEmail = null;
}

window.addEventListener('resize', () => {
  const viewer = document.getElementById("viewer-pane");
  const inbox = document.getElementById("inbox-pane");
  if (window.innerWidth >= 1024) {
    inbox.classList.remove("hidden");
  } else {
    viewer.style.width = ''; 
    if (!viewer.classList.contains("hidden")) inbox.classList.add("hidden");
  }
});

async function processSend(btnId, payload, onSuccess) {
  const btn = document.getElementById(btnId);
  const originalText = btn.innerText;
  
  btn.innerText = "Sending...";
  btn.disabled = true;
  btn.classList.add("opacity-50", "cursor-not-allowed");

  try {
    const res = await fetch(`${WORKER_URL}/send`, {
      method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(payload)
    });

    if (!res.ok) throw new Error("Failed");
    
    btn.innerText = "Sent!";
    btn.classList.remove("bg-red-600", "hover:bg-red-500");
    btn.classList.add("bg-green-600", "hover:bg-green-500");
    if (onSuccess) onSuccess();

  } catch (err) {
    btn.innerText = "Error";
    btn.classList.remove("bg-red-600", "hover:bg-red-500");
    btn.classList.add("bg-red-900", "hover:bg-red-900");
  } finally {
    setTimeout(() => { 
      btn.innerText = originalText; 
      btn.disabled = false; 
      btn.className = btnId === 'reply-btn' ? "bg-red-600 hover:bg-red-500 text-white text-sm font-medium px-4 py-1.5 rounded-md transition-colors" : "bg-red-600 hover:bg-red-500 text-white text-sm font-medium px-5 py-2 rounded-md transition-colors min-w-[80px]";
    }, 2000);
  }
}

async function sendCompose() {
  const to = document.getElementById("compose-to").value.trim();
  const subject = document.getElementById("compose-subject").value.trim();
  const message = document.getElementById("compose-body").value.trim();
  const files = document.getElementById("compose-files").files;

  if (!to || !message) return;

  let attachments = [];
  for (const f of files) attachments.push(await fileToBase64(f));

  // Convert newlines to HTML breaks for proper rendering
  const formattedMessage = message.replace(/\n/g, '<br>');

  await processSend("compose-btn", { to, subject, message: formattedMessage, attachments }, () => {
    document.getElementById("compose-to").value = "";
    document.getElementById("compose-subject").value = "";
    document.getElementById("compose-body").value = "";
    document.getElementById("compose-body").style.height = "inherit";
    document.getElementById("compose-files").value = "";
    setTimeout(closeComposeModal, 500);
    loadInbox();
  });
}

async function sendReply() {
  if (!currentEmail) return;

  const msgInput = document.getElementById("reply-text");
  const msg = msgInput.value.trim();
  const filesInput = document.getElementById("reply-files");

  if (!msg) return;

  let attachments = [];
  for (const f of filesInput.files) attachments.push(await fileToBase64(f));

  // APPEND QUOTED THREAD HISTORY to outgoing message body
  const historyHtml = `
    <br><br>
    <div style="border-left: 2px solid #3f3f46; padding-left: 1rem; margin-left: 0; color: #a1a1aa;">
      <p style="margin-bottom: 0.5rem;">On ${new Date(currentEmail.received_at).toLocaleString()}, <b>${currentEmail.from_email}</b> wrote:</p>
      <blockquote style="margin: 0;">${currentEmail.body}</blockquote>
    </div>
  `;
  const formattedMessage = msg.replace(/\n/g, '<br>') + historyHtml;

  const payload = {
    to: currentEmail.from_email,
    subject: currentEmail.subject.startsWith("Re:") ? currentEmail.subject : "Re: " + currentEmail.subject,
    message: formattedMessage,
    attachments,
    reply_to_message_id: currentEmail.message_id 
  };

  await processSend("reply-btn", payload, () => {
    msgInput.value = "";
    msgInput.style.height = "inherit";
    filesInput.value = "";
    loadInbox(); // Reload inbox to fetch the sent message we just logged
  });
}

function showComposeModal() { document.getElementById("compose-modal").classList.remove("hidden"); }
function closeComposeModal() { document.getElementById("compose-modal").classList.add("hidden"); }

const resizer = document.getElementById('resizer');
const viewerPane = document.getElementById('viewer-pane');
let isResizing = false;

resizer.addEventListener('mousedown', (e) => {
  isResizing = true;
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});

window.addEventListener('mousemove', (e) => {
  if (!isResizing) return;
  let newWidth = window.innerWidth - e.clientX;
  const minWidth = 350; 
  const maxWidth = window.innerWidth - 256 - 250; 
  if (newWidth < minWidth) newWidth = minWidth;
  if (newWidth > maxWidth) newWidth = maxWidth;
  viewerPane.style.width = newWidth + 'px';
});

window.addEventListener('mouseup', () => {
  if (isResizing) {
    isResizing = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

loadInbox();
</script>
</body>
</html>
